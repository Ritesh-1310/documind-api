# GitHub Actions CI/CD to deploy the Documind API to an EC2 instance
name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/documind-api
            git pull origin main
            docker stop documind || true
            docker rm documind || true
            docker build -t documind-api .
            docker run -d --name documind \
              --env-file .env \
              --network host \
              --restart unless-stopped \
              documind-api
            echo "Deployed successfully"
